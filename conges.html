<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Congés - Parc Réception Roulier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<style>
:root {
  --bg: #0a0e14; --surface: #111722; --surface2: #1a2130;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --accent: #3b8fff; --text: #e8edf5; --text2: #7a8fa8; --text3: #4a5a6e;
  --red: #ff4d6d; --blue: #3b8fff; --warn: #ff6b35; --green: #00c896;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; }
header {
  display: flex; flex-direction: column;
  padding: 10px 20px 8px; background: var(--surface);
  border-bottom: 1px solid var(--border2); flex-shrink: 0; gap: 6px;
}
.header-title {
  font-size: 0.7rem; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap;
}
.header-row { display: flex; align-items: center; gap: 8px; }
.week-nav { display: flex; align-items: center; gap: 6px; position: relative; }
.header-spacer { flex: 1; }
.btn { padding: 6px 13px; border-radius: 7px; cursor: pointer; font-size: 0.74rem; font-weight: 700; border: none; transition: all .15s; white-space: nowrap; font-family: inherit; }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); background: var(--surface); border-color: var(--accent); }
.btn-view { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 0.74rem; font-weight: 700; transition: all .15s; white-space: nowrap; font-family: inherit; }
.btn-view:hover { color: var(--text); background: var(--surface); border-color: var(--accent); }
.btn-view.active { background: var(--accent); color: #000; border-color: var(--accent); }
#month-picker-popup {
  display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border2);border-radius:12px;
  padding:12px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,0.5);min-width:200px;
}
main { display: flex; flex: 1; min-height: 0; }
#panel-staff {
  width: 220px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border2); display: none; flex-direction: column; overflow: hidden;
}
#content { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
#view-absences { display: flex; flex-direction: column; flex: 1; padding: 0; overflow: hidden; }
#abs-scroll-area { flex: 1; overflow: auto; min-height: 0; position: relative; }
#abs-scroll-inner { padding: 0 12px 20px; }
.abs-table { border-collapse: separate; border-spacing: 0; font-size: 0.65rem; background: transparent; min-width: 100%; table-layout: fixed; }
.abs-table thead tr th { position: sticky; top: 0; z-index: 2; background: var(--surface); padding: 4px 2px; text-align: center; color: var(--text); font-size: 0.6rem; height: 32px; box-sizing: border-box; font-weight: 700; border-bottom: 2px solid var(--border2); }
.abs-table thead tr th.member-cell { position: sticky; left: 0; z-index: 3; text-align: left; padding-left: 10px; }
.abs-table thead tr th.day-th { border-left: 1px solid rgba(255,255,255,0.08); background-color: var(--surface); background-blend-mode: normal; }
.abs-table tbody tr td { padding: 0; text-align: center; height: 28px; box-sizing: border-box; border: none; }
.abs-table tbody tr td.member-cell { position: sticky; left: 0; z-index: 1; background: var(--surface); padding: 1px 6px 1px 10px; }
.abs-table tbody tr td.day-cell {
  border-top: 2px solid var(--row-color, var(--border2));
  border-bottom: 2px solid var(--row-color, var(--border2));
  border-left: 1px solid rgba(255,255,255,0.06);
  background: transparent;
}
.abs-table tbody tr td.day-first { border-left: 2px solid var(--row-color, var(--border2)); border-radius: 4px 0 0 4px; }
.abs-table tbody tr td.day-last { border-right: 2px solid var(--row-color, var(--border2)); border-radius: 0 4px 4px 0; }
/* Fond samedi/dimanche/JF léger, toujours visible */
.abs-table tbody tr td.day-sat { background: rgba(59,143,255,0.10); }
.abs-table tbody tr td.day-sun, .abs-table tbody tr td.day-ferie { background: rgba(255,77,109,0.10); }
.abs-table tbody tr.abs-spacer td { height: 7px; border: none; background: transparent; }
.abs-code { display: inline-flex; align-items: center; justify-content: center; width: 88%; height: 18px; font-weight: 700; border-radius: 3px; background: rgba(255,107,53,0.35); color: var(--warn); font-size: 0.58rem; }
#cfg-overlay { position: fixed; inset: 0; z-index: 800; display: none; }
#cfg-overlay.open { display: block; }
#cfg-sidebar {
  position: fixed; top: 0; left: -220px; bottom: 0; width: 220px;
  background: var(--surface); border-right: 1px solid var(--border2);
  display: flex; flex-direction: column; z-index: 810;
  transition: left .22s cubic-bezier(.4,0,.2,1);
  box-shadow: 4px 0 24px rgba(0,0,0,0.35);
}
#cfg-sidebar.open { left: 0; }
#cfg-sidebar-title { font-size: 0.65rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; padding: 14px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#cfg-modules { flex: 1; overflow-y: auto; padding: 8px 0; }
.cfg-module-btn {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 9px 14px; background: none; border: none; color: var(--text2);
  font-family: inherit; font-size: 0.75rem; font-weight: 600;
  cursor: pointer; transition: all .12s; text-align: left;
  border-left: 2px solid transparent;
}
.cfg-module-btn:hover { background: var(--surface2); color: var(--text); }
.cfg-module-btn.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }
.cfg-module-icon { font-size: 1rem; flex-shrink: 0; width: 20px; text-align: center; }
.cfg-module-label { flex: 1; }
.cfg-module-arrow { font-size: 0.65rem; color: var(--text3); }
#cfg-subpanel {
  position: fixed; top: 0; bottom: 0; left: 220px;
  width: 320px; background: var(--surface2); border-right: 1px solid var(--border2);
  display: flex; flex-direction: column; z-index: 809;
  transform: translateX(-8px); opacity: 0; pointer-events: none;
  transition: transform .18s cubic-bezier(.4,0,.2,1), opacity .18s;
  box-shadow: 4px 0 24px rgba(0,0,0,0.25);
}
#cfg-subpanel.open { transform: translateX(0); opacity: 1; pointer-events: all; }
#cfg-subpanel-title { font-size: 0.65rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; padding: 14px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#cfg-subpanel-body { flex: 1; overflow-y: auto; padding: 14px; }
#cfg-subpanel-footer { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
.cfg-staff-list { display: flex; flex-direction: column; gap: 4px; }
.cfg-staff-row  { display: flex; align-items: center; gap: 8px; padding: 5px 4px; border-radius: 6px; }
.cfg-staff-row:hover { background: var(--surface); }
.cfg-staff-name { font-size: 0.73rem; font-weight: 600; flex: 1; }
.cfg-colors     { display: flex; gap: 4px; align-items: center; }
.cfg-swatch     { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .12s, border-color .12s; flex-shrink: 0; }
.cfg-swatch:hover    { transform: scale(1.2); }
.cfg-swatch.selected { border-color: #fff; }
.cfg-swatch-reset    { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; background: var(--surface2); border: 1px solid var(--border2); font-size: 0.6rem; display: flex; align-items: center; justify-content: center; color: var(--text3); transition: all .12s; flex-shrink: 0; }
.cfg-swatch-reset:hover { color: var(--red); border-color: var(--red); }
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
#modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 24px; max-width: 520px; width: 94%; }
.modal-label { font-size: 0.72rem; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; }
.modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); padding: 8px 12px; margin-bottom: 12px; outline: none; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-btn { padding: 8px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; }
.modal-btn-cancel { background: var(--surface2); color: var(--text2); }
.modal-btn-ok { background: var(--accent); color: #000; }
#toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #000; padding: 10px 18px; border-radius: 8px; font-size: 0.78rem; font-weight: 700; transform: translateY(60px); opacity: 0; transition: all .25s; z-index: 2000; }
#toast.show { transform: translateY(0); opacity: 1; }

/* ── SPINNER ZONE CONTENU ── */
.zone-spinner {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: absolute; inset: 0; gap: 14px; z-index: 20;
  background: rgba(10,14,20,0.55);
}
.spinner-ring {
  width: 40px; height: 40px; border-radius: 50%;
  border: 3px solid var(--border2); border-top-color: var(--accent);
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-label { font-size: 0.7rem; font-weight: 700; color: var(--text3); letter-spacing: .06em; }

/* ── CONGES MANUELS (gris) ── */
.abs-code-manual { display: inline-flex; align-items: center; justify-content: center; width: 88%; height: 18px; font-weight: 700; border-radius: 3px; background: rgba(140,150,165,0.30); color: #9ba8b8; font-size: 0.58rem; position: relative; }
/* ── BOUTON DEMANDE CONGES FLOTTANT ── */
.member-cell-wrap { position: relative; display: block; }
.btn-demande-conge {
  opacity: 0; pointer-events: none;
  transition: opacity .15s;
  position: absolute; bottom: 2px; right: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); border: none;
  color: #000; font-size: 0.75rem; font-weight: 900;
  line-height: 1; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding: 0; font-family: inherit;
}
tr:hover .btn-demande-conge { opacity: 1; pointer-events: all; }
/* ── MODALE DEMANDE CONGES ── */
#conge-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: none; align-items: center; justify-content: center;
  z-index: 1100; backdrop-filter: blur(6px);
}
#conge-modal-overlay.show { display: flex; }
#conge-modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; padding: 0; width: min(96vw, 900px);
  max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
}
.cm-header {
  padding: 14px 20px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.cm-title { font-size: 0.78rem; font-weight: 700; color: var(--text); }
.cm-worker { font-size: 0.72rem; color: var(--accent); font-weight: 700; }
.cm-matricule { font-size: 0.62rem; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 1px; }
.cm-close { margin-left: auto; background: none; border: none; color: var(--text3); font-size: 1.1rem; cursor: pointer; padding: 2px 6px; border-radius: 5px; transition: color .12s; }
.cm-close:hover { color: var(--red); }
.cm-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
/* Type selector — trigger fermé */
.cm-type-trigger {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
  padding: 7px 12px; font-size: 0.72rem; font-weight: 600; font-family: inherit;
  color: var(--text2); cursor: pointer; transition: border-color .12s;
}
.cm-type-trigger:hover, .cm-type-trigger.open { border-color: var(--accent); color: var(--text); }
.cm-type-trigger-arrow { font-size: 0.65rem; color: var(--text3); transition: transform .15s; }
.cm-type-trigger.open .cm-type-trigger-arrow { transform: rotate(180deg); }
/* Dropdown en superposition hors modale */
.cm-type-dropdown {
  position: fixed;
  background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
  overflow: hidden; z-index: 1200;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  min-width: 260px;
}
/* Liste dans le dropdown */
.cm-types { display: flex; flex-direction: column; gap: 0; max-height: 220px; overflow-y: auto; }
.cm-type-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px; cursor: pointer; font-size: 0.68rem;
  font-weight: 600; font-family: inherit;
  border-bottom: 1px solid var(--border);
  background: var(--surface2); color: var(--text2);
  transition: background .1s, color .1s;
}
.cm-type-row:last-child { border-bottom: none; }
.cm-type-row:hover { background: var(--surface); color: var(--text); }
.cm-type-row.active { background: rgba(59,143,255,0.12); color: var(--accent); }
.cm-type-row-code { font-size: 0.65rem; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; min-width: 44px; }
.cm-type-row.active .cm-type-row-code { color: var(--accent); }
/* Mini calendar dans modale */
.cm-cal-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cm-cal-nav-btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); cursor: pointer; border-radius: 5px; padding: 3px 9px; font-size: 0.9rem; transition: all .12s; }
.cm-cal-nav-btn:hover { border-color: var(--accent); color: var(--text); }
.cm-cal-month-label { font-size: 0.75rem; font-weight: 700; color: var(--text); min-width: 120px; text-align: center; }
.cm-cal-grid {
  display: grid; grid-template-columns: repeat(31, 1fr);
  gap: 2px; min-width: 0;
}
.cm-day-hdr { font-size: 0.52rem; font-weight: 700; color: var(--text3); text-align: center; padding: 1px 0; }
.cm-day-cell {
  text-align: center; border-radius: 4px;
  font-size: 0.6rem; font-weight: 700; cursor: pointer;
  transition: border-color .1s;
  position: relative; border: 1px solid transparent;
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center; flex-direction: column;
  background: rgba(255,255,255,0.06);
}
.cm-day-cell.sun, .cm-day-cell.ferie { background: rgba(255,77,109,0.15); color: var(--red); }
.cm-day-cell.sat { background: rgba(59,143,255,0.15); color: var(--blue); }
.cm-day-cell.normal { color: var(--text2); }
.cm-day-cell:hover:not(.disabled):not(.api-occupied) { border-color: var(--accent); }
/* start/end : contour bleu uniquement, pas de remplissage */
.cm-day-cell.selected-start, .cm-day-cell.selected-end {
  border: 2px solid var(--accent) !important;
  color: var(--accent) !important;
}
/* in-range : contour fin, léger fond */
.cm-day-cell.in-range {
  border-color: rgba(59,143,255,0.5) !important;
  box-shadow: inset 0 0 0 1px rgba(59,143,255,0.3);
}
.cm-day-cell.in-range.sun, .cm-day-cell.in-range.ferie { border-color: rgba(255,77,109,0.5) !important; box-shadow: inset 0 0 0 1px rgba(255,77,109,0.25); }
.cm-day-cell.has-manual { background: rgba(140,150,165,0.25); color: #9ba8b8; }
.cm-day-cell.has-api { background: rgba(255,107,53,0.30); color: var(--warn); }
.cm-day-cell.api-occupied { cursor: not-allowed; opacity: 0.6; }
.cm-day-cell .cm-del-btn {
  display: none; position: absolute; top: -4px; right: -4px;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--red); color: #fff; font-size: 0.5rem;
  align-items: center; justify-content: center; cursor: pointer;
  font-weight: 900; z-index: 2;
}
.cm-day-cell.has-manual:hover .cm-del-btn { display: flex; }
.cm-day-num { font-size: 0.55rem; color: var(--text3); }
.cm-day-code { font-size: 0.6rem; font-weight: 700; }
.cm-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }
.cm-footer-btn { padding: 7px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; font-size: 0.74rem; }
.cm-sel-info { font-size: 0.68rem; color: var(--text2); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.cm-sel-tag { background: rgba(59,143,255,0.2); border: 1px solid rgba(59,143,255,0.4); color: var(--accent); border-radius: 5px; padding: 2px 8px; font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.cm-sel-tag:hover { background: rgba(255,77,109,0.2); border-color: var(--red); color: var(--red); }
/* Confirm dialog */
#conge-confirm-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center; z-index: 1200;
}
#conge-confirm-overlay.show { display: flex; }
#pdf-month-select-overlay { display: none; }
#pdf-month-select-overlay.show { display: flex; }
#conge-confirm-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 12px; padding: 20px 24px; max-width: 340px; width: 94%;
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-title">Gestion Congés Parc Réception Roulier</div>
    <div class="header-row">
      <button class="btn btn-ghost" id="btn-settings" style="padding:5px 9px;">⚙️</button>
      <button class="btn-view" id="btn-view-week" onclick="window.location.href='affectation.html'">Affectation</button>
      <button class="btn-view active" id="btn-view-absences">Congés</button>
      <div class="header-spacer"></div>
      <div class="week-nav" id="header-month-nav" style="position:relative;">
        <button id="btn-abs-prev" class="btn btn-ghost" style="padding:4px 10px;font-size:1rem;">‹</button>
        <div id="header-month-label" style="font-size:0.8rem;font-weight:700;background:var(--surface2);padding:5px 14px;border-radius:20px;border:1px solid var(--border2);white-space:nowrap;min-width:140px;text-align:center;cursor:pointer;transition:border-color .15s;" title="Choisir un mois">—</div>
        <div id="month-picker-popup">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <button id="mp-prev-year" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;padding:0 4px;transition:color .12s;">‹</button>
            <span id="mp-year-label" style="font-size:0.75rem;font-weight:700;color:var(--text);"></span>
            <button id="mp-next-year" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;padding:0 4px;transition:color .12s;">›</button>
          </div>
          <div id="mp-months-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;"></div>
        </div>
        <button id="btn-abs-next" class="btn btn-ghost" style="padding:4px 10px;font-size:1rem;">›</button>
      </div>
      <div class="header-spacer"></div>
      <button class="btn btn-ghost" id="btn-print-abs" title="Imprimer PDF">🖨 PDF</button>
      <span id="sync-status"></span>
    </div>
  </header>
  <main>
    <div id="panel-staff">
      <div class="panel-title">Personnel</div>
      <input type="text" id="staff-search" placeholder="Rechercher…">
      <div id="staff-list"></div>
    </div>
    <div id="content">
      <div id="view-absences">
        <div id="abs-scroll-area">
          <div id="abs-spinner" class="zone-spinner"><div class="spinner-ring"></div><span class="spinner-label">Chargement…</span></div>
          <div id="abs-scroll-inner">
            <table class="abs-table" id="abs-body-table">
              <thead id="abs-thead"></thead>
              <tbody id="abs-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="modal-overlay"><div class="modal" id="modal-content"></div></div>
<div id="cfg-overlay"></div>
<div id="cfg-sidebar">
  <div id="cfg-sidebar-title">⚙ Configuration</div>
  <div id="cfg-modules">
    <button class="cfg-module-btn" data-module="absences"><span class="cfg-module-icon">📋</span><span class="cfg-module-label">Membres</span><span class="cfg-module-arrow">›</span></button>
    <button class="cfg-module-btn" data-module="personnel"><span class="cfg-module-icon">👥</span><span class="cfg-module-label">Groupes</span><span class="cfg-module-arrow">›</span></button>
    <button class="cfg-module-btn" data-module="mail"><span class="cfg-module-icon">✉</span><span class="cfg-module-label">Emails</span><span class="cfg-module-arrow">›</span></button>

<script>
// ═══════════════════════════════════════════════════════════════
// CONGES.HTML - Logique spécifique vue Congés (Mois)
// ═══════════════════════════════════════════════════════════════

let _mpYear = new Date().getFullYear();
const MONTHS_FR = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

// ── RENDER ABSENCES TABLE ──
function renderAbsences() {
    const sp = document.getElementById('abs-spinner');
    if (sp) sp.style.display = 'none';
    const startOfMonth = new Date(state.absMonth.getFullYear(), state.absMonth.getMonth(), 1);
    const daysInMonth = new Date(state.absMonth.getFullYear(), state.absMonth.getMonth() + 1, 0).getDate();
    const monthLabel = state.absMonth.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

    const headerLabel = document.getElementById('header-month-label');
    if (headerLabel) headerLabel.textContent = monthLabel.charAt(0).toUpperCase() + monthLabel.slice(1);

    const bodyTable = document.getElementById('abs-body-table');
    if (!bodyTable) return;

    console.log('[renderAbsences] Mois:', monthLabel, '| Jours:', daysInMonth);

    if (state.staff.length === 0) {
        bodyTable.innerHTML = '<thead></thead><tbody><tr><td colspan="' + (daysInMonth + 1) + '" style="padding:20px;text-align:center;color:var(--text3)">Aucune donnée</td></tr></tbody>';
        return;
    }

    const MEMBER_W = '160px';
    const DAY_W = '28px';

    const order = state.config.absOrder || state.staff.map(w => w.id);
    const staffSorted = [...order].map(id => state.staff.find(w => w.id === id)).filter(Boolean);
    state.staff.forEach(w => { if (!staffSorted.find(s => s.id === w.id)) staffSorted.push(w); });

    let colgroup = '<colgroup><col style="width:' + MEMBER_W + ';min-width:' + MEMBER_W + ';max-width:' + MEMBER_W + '">';
    for (let i = 1; i <= daysInMonth; i++) {
        colgroup += '<col style="width:' + DAY_W + ';min-width:' + DAY_W + ';max-width:' + DAY_W + '">';
    }
    colgroup += '</colgroup>';

    let headerRow = '<tr><th class="member-cell">Personnel</th>';
    for (let i = 1; i <= daysInMonth; i++) {
        const d = new Date(startOfMonth.getFullYear(), startOfMonth.getMonth(), i);
        const dateISO = fmtISO(d);
        const dow = d.toLocaleDateString('fr-FR', { weekday: 'short' }).substring(0, 3);
        const isSat = d.getDay() === 6;
        const isSun = d.getDay() === 0;
        const isFerie = !!state.holidays[dateISO];
        const isVacances = !!(state.schoolHolidays && state.schoolHolidays[dateISO]);
        const isRed = isSun || isFerie;
        const bgStyle = isRed ? 'background-image:linear-gradient(rgba(255,77,109,0.18),rgba(255,77,109,0.18));' : isSat ? 'background-image:linear-gradient(rgba(59,143,255,0.18),rgba(59,143,255,0.18));' : '';
        const vacStyle = isVacances ? 'box-shadow:inset 0 3px 0 var(--red);' : '';
        headerRow += '<th class="day-th" style="' + bgStyle + vacStyle + '">' + i + '<br><span style="font-weight:400;font-size:0.55rem">' + dow + '</span></th>';
    }
    headerRow += '</tr>';

    let rows = '';
    staffSorted.forEach(w => {
        const colorKey = state.config.workerColors?.[w.id];
        const colorMap = { rouge:'#ff4d6d', violet:'#a78bfa', vert:'#00c896', bleu:'#3b8fff', jaune:'#ffd060' };
        const borderColor = colorKey ? colorMap[colorKey] : 'rgba(255,255,255,0.20)';

        const bColor = colorKey ? borderColor : 'rgba(255,255,255,0.20)';
        const memberCell = `<td class="member-cell"><div class="member-cell-wrap" style="padding:4px 6px;border-radius:6px;border:1px solid ${bColor};text-align:left;"><div style="font-size:0.68rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${w.lastName} ${w.firstName}</div><div style="font-size:0.58rem;color:var(--text3);font-family:'DM Mono',monospace;">${w.matricule || '—'}</div><button class="btn-demande-conge" data-wid="${w.id}" title="Demande de congés">+</button></div></td>`;

        let dayCells = '';
        for (let i = 1; i <= daysInMonth; i++) {
            const d = new Date(startOfMonth.getFullYear(), startOfMonth.getMonth(), i);
            const dateISO = fmtISO(d);
            const apiCode = state.absences[w.id]?.[dateISO] || '';
            const manualCode = state.manualConges[w.id]?.[dateISO] || '';
            const code = apiCode || manualCode;
            const isManual = !apiCode && !!manualCode;
            const isSat = d.getDay() === 6;
            const isSun = d.getDay() === 0;
            const isFerie = !!state.holidays[dateISO];
            const colorClass = isSun || isFerie ? ' day-sun' : isSat ? ' day-sat' : '';
            const firstLast = i === 1 ? ' day-first' : i === daysInMonth ? ' day-last' : '';
            const codeSpan = code ? `<span class="${isManual ? 'abs-code-manual' : 'abs-code'}">${code}</span>` : '';
            dayCells += `<td class="day-cell${colorClass}${firstLast}">${codeSpan}</td>`;
        }
        const rowColor = colorKey ? borderColor : 'rgba(255,255,255,0.20)';
        rows += `<tr style="--row-color:${rowColor};">${memberCell}${dayCells}</tr><tr class="abs-spacer"><td colspan="${daysInMonth + 1}"></td></tr>`;
    });

    bodyTable.innerHTML = colgroup + '<thead>' + headerRow + '</thead><tbody>' + rows + '</tbody>';
    // Event delegation pour les boutons demande de congé
    bodyTable.querySelectorAll('.btn-demande-conge').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            openCongeModal(this.dataset.wid);
        });
    });
}

// ── PDF ABSENCES — sélection des mois puis génération jsPDF ──
function printAbsPDF() {
  const overlay = document.getElementById('pdf-month-select-overlay');
  if (!overlay) return;

  const curY = state.absMonth.getFullYear();
  const curM = state.absMonth.getMonth();

  // 1. Afficher l'année
  document.getElementById('pdf-sel-year').textContent = curY;
  document.getElementById('pdf-sel-year').dataset.year = curY;

  // 2. Créer les cases à cocher
  renderPdfMonthCheckboxes(curY);

  // 3. Pré-cocher le mois courant (cases maintenant dans le DOM)
  overlay.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.checked = (parseInt(cb.dataset.month) === curM && parseInt(cb.dataset.year) === curY);
  });

  overlay.classList.add('show');
}

function renderPdfMonthCheckboxes(year) {
  const grid = document.getElementById('pdf-month-grid');
  if (!grid) return;
  const MONTHS_LONG = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  grid.innerHTML = MONTHS_LONG.map((name, i) =>
    `<label style="display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:0.73rem;font-weight:600;color:var(--text2);transition:background .1s;" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background='transparent'">
      <input type="checkbox" data-month="${i}" data-year="${year}" style="accent-color:var(--accent);width:13px;height:13px;">
      ${name}
    </label>`
  ).join('');
}

function closePdfMonthSelect() {
  document.getElementById('pdf-month-select-overlay').classList.remove('show');
}
window.closePdfMonthSelect = closePdfMonthSelect;

function changePdfYear(delta) {
  const el = document.getElementById('pdf-sel-year');
  const y = parseInt(el.dataset.year) + delta;
  el.dataset.year = y;
  el.textContent = y;
  renderPdfMonthCheckboxes(y);
  // Pré-cocher le mois courant si on revient sur l'année courante
  const curY = state.absMonth.getFullYear();
  const curM = state.absMonth.getMonth();
  if (y === curY) {
    document.getElementById('pdf-month-grid').querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.checked = (parseInt(cb.dataset.month) === curM);
    });
  }
}
window.changePdfYear = changePdfYear;

async function generateAbsPDF() {
  const grid = document.getElementById('pdf-month-grid');
  const checked = [...grid.querySelectorAll('input[type=checkbox]:checked')];
  if (checked.length === 0) { toast('Sélectionnez au moins un mois', 'error'); return; }

  // Afficher état chargement dans la modale
  const genBtn = document.querySelector('#pdf-month-select-overlay button[onclick="generateAbsPDF()"]');
  if (genBtn) { genBtn.textContent = '⏳ Chargement…'; genBtn.disabled = true; }

  const { jsPDF } = window.jspdf;
  if (!jsPDF) { toast('Erreur: librairie PDF non chargée', 'error'); return; }

  const colorMapRGB = {
    rouge: [255, 77, 109], violet: [167, 139, 250],
    vert:  [0, 200, 150],  bleu:   [59, 143, 255],
    jaune: [255, 208, 96]
  };
  const BLUE_H  = [59, 143, 255];
  const RED_H   = [255, 77, 109];
  const GREY_BG = [235, 238, 242];
  const SAT_BG  = [200, 230, 255]; // ACCENTUÉ
  const SUN_BG  = [255, 210, 220]; // ACCENTUÉ
  const HDR_BG  = [245, 246, 248];

  const today = new Date().toLocaleDateString('fr-FR');
  const MONTHS_LONG_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  const order    = state.config.absOrder || state.staff.map(w => w.id);
  const printSet = new Set(state.config.absPrint !== undefined ? state.config.absPrint : state.staff.map(w => w.id));
  const staffSorted = [...order].map(id => state.staff.find(w => w.id === id)).filter(Boolean);
  state.staff.forEach(w => { if (!staffSorted.find(s => s.id === w.id)) staffSorted.push(w); });
  const printStaff = staffSorted.filter(w => printSet.has(w.id));

  // Trier les mois sélectionnés chronologiquement
  const months = checked
    .map(cb => ({ year: parseInt(cb.dataset.year), month: parseInt(cb.dataset.month) }))
    .sort((a, b) => a.year !== b.year ? a.year - b.year : a.month - b.month);

  // Sauvegarder le mois courant pour le restaurer après
  const savedMonth = new Date(state.absMonth);

  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const W = 297, H = 210;
  const marginL = 8, marginR = 8, marginT = 16;
  const footerY = H - 5;

  for (let pi = 0; pi < months.length; pi++) {
    if (pi > 0) doc.addPage();

    const { year, month } = months[pi];

    // Charger les données du mois via le mécanisme existant
    state.absMonth = new Date(year, month, 1);
    if (genBtn) genBtn.textContent = '⏳ ' + MONTHS_LONG_FR[month] + '…';
    await loadMonthData();

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const monthLabel  = MONTHS_LONG_FR[month] + ' ' + year;

    // ── Titre centré ──
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.setTextColor(30, 35, 50);
    const tW = doc.getTextWidth(monthLabel.toUpperCase());
    doc.text(monthLabel.toUpperCase(), (W - tW) / 2, 10);

    // ── Dimensions ──
    const usableW  = W - marginL - marginR;
    const nameColW = 36;
    const dayColW  = (usableW - nameColW) / daysInMonth;
    const hdrH     = 10;
    const rowH     = 8;

    // ── En-tête jours ──
    let cx = marginL + nameColW;
    for (let d = 1; d <= daysInMonth; d++) {
      const date  = new Date(year, month, d);
      const isSat = date.getDay() === 6;
      const isSun = date.getDay() === 0;
      const isFer = !!state.holidays[fmtISO(date)];
      const dow   = date.toLocaleDateString('fr-FR', { weekday: 'short' }).substring(0, 2);

      if (isSun || isFer)     doc.setFillColor(...SUN_BG);
      else if (isSat)         doc.setFillColor(...SAT_BG);
      else                    doc.setFillColor(...HDR_BG);
      doc.rect(cx, marginT, dayColW, hdrH, 'F');
      doc.setDrawColor(210, 212, 218);
      doc.setLineWidth(0.2);
      doc.rect(cx, marginT, dayColW, hdrH, 'S');

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(6);
      if (isSun || isFer)    doc.setTextColor(...RED_H);
      else if (isSat)        doc.setTextColor(...BLUE_H);
      else                   doc.setTextColor(50, 55, 70);
      const dStr = String(d);
      doc.text(dStr, cx + (dayColW - doc.getTextWidth(dStr)) / 2, marginT + 4);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(4.5);
      doc.setTextColor(130, 140, 155);
      doc.text(dow, cx + (dayColW - doc.getTextWidth(dow)) / 2, marginT + 8);

      cx += dayColW;
    }

    // Entête colonne nom
    doc.setFillColor(...HDR_BG);
    doc.rect(marginL, marginT, nameColW, hdrH, 'F');
    doc.setDrawColor(210, 212, 218);
    doc.setLineWidth(0.2);
    doc.rect(marginL, marginT, nameColW, hdrH, 'S');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(6);
    doc.setTextColor(100, 110, 125);
    doc.text('PERSONNEL', marginL + 3, marginT + 6);

    // ── Lignes membres ──
    let ry = marginT + hdrH + 2;
    printStaff.forEach(w => {
      const colorKey   = state.config.workerColors?.[w.id];
      const liserColor = colorKey ? colorMapRGB[colorKey] : [180, 185, 195];

      // Carte membre : liseré couleur du membre, pas de bande à gauche
      doc.setFillColor(252, 252, 254);
      doc.roundedRect(marginL, ry, nameColW, rowH, 1, 1, 'F');
      doc.setDrawColor(...liserColor);
      doc.setLineWidth(0.4);
      doc.roundedRect(marginL, ry, nameColW, rowH, 1, 1, 'S');

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(6);
      doc.setTextColor(30, 35, 50);
      doc.text((w.lastName + ' ' + w.firstName).substring(0, 18), marginL + 5, ry + 4.5);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(4.5);
      doc.setTextColor(140, 150, 165);
      doc.text(w.matricule || '', marginL + 5, ry + 7);

      // Cellules jours : bords arrondis et contour couleur membre
      cx = marginL + nameColW;
      for (let d = 1; d <= daysInMonth; d++) {
        const date    = new Date(year, month, d);
        const iso     = fmtISO(date);
        const apiCode = state.absences[w.id]?.[iso] || '';
        const manCode = state.manualConges[w.id]?.[iso] || '';
        const code    = apiCode || manCode;
        const isSat   = date.getDay() === 6;
        const isSun   = date.getDay() === 0;
        const isFer   = !!state.holidays[iso];

        if (code)            doc.setFillColor(...GREY_BG);
        else if (isSun||isFer) doc.setFillColor(...SUN_BG);
        else if (isSat)      doc.setFillColor(...SAT_BG);
        else                 doc.setFillColor(255, 255, 255);

        doc.roundedRect(cx, ry, dayColW, rowH, 1, 1, 'F');
        doc.setDrawColor(...liserColor);
        doc.setLineWidth(0.15);
        doc.roundedRect(cx, ry, dayColW, rowH, 1, 1, 'S');

        if (code) {
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(5);
          doc.setTextColor(30, 35, 50);
          const cW = doc.getTextWidth(code);
          doc.text(code, cx + (dayColW - cW) / 2, ry + rowH / 2 + 1.5);
        }
        cx += dayColW;
      }
      ry += rowH + 1.5;
    });

    // ── Pied de page ──
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(6);
    doc.setTextColor(170, 170, 180);
    doc.text('Document généré le ' + today + ' par Gestion Parc Réception Roulier', marginL, footerY);
    const pgStr = (pi + 1) + ' / ' + months.length;
    doc.text(pgStr, W - marginR - doc.getTextWidth(pgStr), footerY);
  }

  // Restaurer le mois courant et le tableau
  state.absMonth = savedMonth;
  await loadMonthData();
  renderAbsences();

  closePdfMonthSelect();

  const fileName = 'Conges_' + months.map(m => MONTHS_LONG_FR[m.month].substring(0,3) + m.year).join('-') + '.pdf';
  doc.save(fileName);

  if (genBtn) { genBtn.textContent = '📄 Générer PDF'; genBtn.disabled = false; }
}
window.generateAbsPDF = generateAbsPDF;

// ── MONTH PICKER ──
function renderMonthPicker() {
  const yearLabel = document.getElementById('mp-year-label');
  const grid = document.getElementById('mp-months-grid');
  if (!yearLabel || !grid) return;

  yearLabel.textContent = _mpYear;
  const curM = state.absMonth.getMonth();

function toggleCmTypeDropdown() {

function renderCmCal() {
  const year = _cmMonth.getFullYear();
  const month = _cmMonth.getMonth();
  const label = _cmMonth.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
  document.getElementById('cm-cal-label').textContent = label.charAt(0).toUpperCase() + label.slice(1);

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const grid = document.getElementById('cm-cal-grid');
  grid.style.gridTemplateColumns = 'repeat(' + daysInMonth + ', 1fr)';
  grid.innerHTML = '';

  const DOWS = ['Di','Lu','Ma','Me','Je','Ve','Sa'];

  for (let i = 1; i <= daysInMonth; i++) {
    const d = new Date(year, month, i);
    const iso = fmtISO(d);
    // En-tête
    const hdr = document.createElement('div');
    hdr.className = 'cm-day-hdr';
    hdr.innerHTML = i + '<br><span style="font-weight:400">' + DOWS[d.getDay()] + '</span>';
    grid.appendChild(hdr);
  }

  for (let i = 1; i <= daysInMonth; i++) {
    const d = new Date(year, month, i);
    const iso = fmtISO(d);
    const isSun = d.getDay() === 0;
    const isSat = d.getDay() === 6;
    const isFerie = !!state.holidays[iso];
    const apiCode = (state.absences[_cmWorkerId] || {})[iso] || '';
    const manualCode = (state.manualConges[_cmWorkerId] || {})[iso] || '';

    const isApiOccupied = !!apiCode;
    const isManual = !isApiOccupied && !!manualCode;
    const displayCode = apiCode || manualCode;

    let inSel = false, isStart = false, isEnd = false;
    _cmSelections.forEach(sel => {
      const fd = new Date(sel.from), td = new Date(sel.to);
      const dd = new Date(iso);
      if (dd >= fd && dd <= td) inSel = true;
      if (iso === sel.from) isStart = true;
      if (iso === sel.to) isEnd = true;
    });
    if (_cmClickStart) {
      if (iso === _cmClickStart) isStart = true;
      // Pas de preview de plage avant le 2ème clic : on marque seulement le 1er jour
    }

    const cell = document.createElement('div');
    let cls = 'cm-day-cell';
    if (isSun || isFerie) cls += ' sun';
    else if (isSat) cls += ' sat';
    else cls += ' normal';
    if (isApiOccupied) cls += ' has-api api-occupied';
    else if (isManual) cls += ' has-manual';
    if (isStart) cls += ' selected-start';
    else if (isEnd) cls += ' selected-end';
    else if (inSel) cls += ' in-range';
    cell.className = cls;

    if (!isApiOccupied) {
      cell.addEventListener('click', () => cmDayClick(iso));
    }

    if (isManual) {
      const delBtn = document.createElement('div');
      delBtn.className = 'cm-del-btn';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', (e) => { e.stopPropagation(); cmDeleteDay(iso); });
      cell.appendChild(delBtn);
    }

    if (displayCode) {
      const codeDiv = document.createElement('div');
      codeDiv.className = 'cm-day-code';
      codeDiv.textContent = displayCode;
      cell.appendChild(codeDiv);
    }

    grid.appendChild(cell);
  }
}


function cmDayClick(iso) {
  if (!_cmSelectedType) {
    toast("Choisissez d'abord un type de congés", 'error');
    return;
  }

  const d = new Date(iso);
  const isSun = d.getDay() === 0;
  const isSat = d.getDay() === 6;
  const isFerie = !!state.holidays[iso];

  if (!_cmClickStart) {
    // 1er clic — vérification jour unique férié
    if (isFerie && (_cmSelectedType === 'CP' || _cmSelectedType === 'RR')) {
      _cmConfirmCb = (yes) => {
        if (yes) {
          addSingleDayConge(iso, 'FE');
        }
        _cmClickStart = null;
        renderCmCal();
      };
      document.getElementById('confirm-msg').textContent = 'Attention ce jour est férié. Poser FE à la place ?';
      document.getElementById('conge-confirm-overlay').classList.add('show');
      return;
    }
    _cmClickStart = iso;
    renderCmCal();
  } else {
    // 2ème clic — constitution de la plage
    let from = _cmClickStart < iso ? _cmClickStart : iso;
    let to   = _cmClickStart < iso ? iso : _cmClickStart;
    _cmClickStart = null;

    // Construire la liste des jours de la plage
    const days = buildDaysConge(from, to);
    _cmSelections.push({ from, to, code: _cmSelectedType, days });
    renderCmSelections();
    renderCmCal();
  }
}
window.cmDayClick = cmDayClick;

// Construit le mapping date→code pour une plage selon les règles
function buildDaysConge(from, to) {
  const result = {};
  const cur = new Date(from);
  const end = new Date(to);
  while (cur <= end) {
    const iso = fmtISO(cur);
    const isSun = cur.getDay() === 0;
    const isSat = cur.getDay() === 6;
    const isFerie = !!state.holidays[iso];
    const apiOccupied = !!state.absences[_cmWorkerId]?.[iso];

    if (!apiOccupied) {
      if (_cmSelectedType === 'CP') {
        if (isSun) result[iso] = 'R';
        else if (isFerie) result[iso] = 'FE';
        else result[iso] = 'CP';
      } else if (_cmSelectedType === 'RR') {
        if (isSun) result[iso] = 'R';
        else if (isSat) result[iso] = 'RP';
        else if (isFerie) result[iso] = 'FE';
        else result[iso] = 'RR';
      } else {
        result[iso] = _cmSelectedType;
      }
    }
    cur.setDate(cur.getDate() + 1);
  }
  return result;
}

function addSingleDayConge(iso, code) {
  if (!state.manualConges[_cmWorkerId]) state.manualConges[_cmWorkerId] = {};
  state.manualConges[_cmWorkerId][iso] = code;
  mergeAbsences();
  renderAbsences();
  renderCmCal();
}

function cmDeleteDay(iso) {
  if (!state.manualConges[_cmWorkerId]) return;
  delete state.manualConges[_cmWorkerId][iso];
  // Supprimer aussi des sélections en attente
  _cmSelections = _cmSelections.filter(sel => {
    delete sel.days[iso];
    return Object.keys(sel.days).length > 0;
  });
  mergeAbsences();
  renderAbsences();
  renderCmCal();
  renderCmSelections();
}
window.cmDeleteDay = cmDeleteDay;

function isoToFR(iso) {
  const [y, m, d] = iso.split('-');
  return d + '-' + m + '-' + y;
}

function renderCmSelections() {
  const wrap = document.getElementById('cm-selections-wrap');
  const cont = document.getElementById('cm-selections');
  if (_cmSelections.length === 0) {
    wrap.style.display = 'none';
    cont.innerHTML = '';
    return;
  }
  wrap.style.display = '';
  cont.innerHTML = '';
  _cmSelections.forEach((sel, idx) => {
    // Compte uniquement les jours qui correspondent au type principal (pas les R/RP/FE dérivés)
    const mainCode = sel.code;
    const mainDays = Object.values(sel.days).filter(c => c === mainCode).length;
    const totalDays = Object.keys(sel.days).length;
    const fromFR = isoToFR(sel.from);
    const toFR = isoToFR(sel.to);
    const label = sel.from === sel.to
      ? mainCode + ' · ' + fromFR + ' (' + mainDays + ' j)'
      : mainCode + ' · ' + fromFR + ' → ' + toFR + ' (' + mainDays + ' j de ' + mainCode + ')';    const tag = document.createElement('div');
    tag.className = 'cm-sel-tag';
    tag.title = 'Cliquer pour supprimer';
    tag.textContent = label + ' ✕';
    tag.onclick = () => removeSelection(idx);
    cont.appendChild(tag);
  });
}
function removeSelection(idx) {
  _cmSelections.splice(idx, 1);
  renderCmSelections();
  renderCmCal();
}
window.removeSelection = removeSelection;

// ── FICHE PDF TRANSMANUTENTION ──
function generateFicheConges() {
  if (_cmSelections.length === 0) {
    toast('Aucune plage sélectionnée', 'error');
    return;
  }
  const worker = getWorker(_cmWorkerId);
  if (!worker) return;

  const { jsPDF } = window.jspdf;
  if (!jsPDF) { toast('Erreur: librairie PDF non chargée', 'error'); return; }

  // ── Calcul des infos de plage ──
  // On prend la 1ère plage de DU/AU, et on additionne les jours principaux
  const allDays = {};
  const codeCounts = {};
  _cmSelections.forEach(sel => {
    Object.entries(sel.days).forEach(([iso, code]) => {
      allDays[iso] = code;
      codeCounts[code] = (codeCounts[code] || 0) + 1;
    });
  });

  const sortedISO = Object.keys(allDays).sort();
  const duISO  = sortedISO[0];
  const auISO  = sortedISO[sortedISO.length - 1];
  const duFR   = duISO  ? isoToFR(duISO)  : '—';
  const auFR   = auISO  ? isoToFR(auISO)  : '—';

  // Résumé du nombre de jours ex: "7 CP + 1 R"
  const nbJoursStr = Object.entries(codeCounts)
    .map(([code, n]) => n + ' ' + code)
    .join(' + ');

  const today = new Date().toLocaleDateString('fr-FR');
  const year  = new Date().getFullYear();

  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, H = 297;
  const margin = 18;

  // ── COULEUR TRANSMANUTENTION (bleu) ──
  const BLUE = [47, 117, 181]; // #2F75B5

  // ══ HEADER ══
  // Fond blanc (pas de bande colorée)

  // Nom société en bleu italique
  doc.setFont('helvetica', 'bolditalic');
  doc.setFontSize(22);
  doc.setTextColor(...BLUE);
  doc.text('TRANSMANUTENTION', margin, 16);

  // Ligne bleue de marge à marge sous TRANSMANUTENTION
  doc.setDrawColor(...BLUE);
  doc.setLineWidth(0.5);
  doc.line(margin, 22, W - margin, 22);

  // Titre du document (à droite, sous la ligne)
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(50, 55, 70);
  const titleStr = 'DEMANDE DE CONGÉS ' + year;
  const titleW = doc.getTextWidth(titleStr);
  doc.text(titleStr, W - margin - titleW, 28);

  // ══ CORPS ══
  let y = 38;
  const fieldH = 18;
  const labelH = 5;
  const col1x = margin;
  const col3W = (W - 2 * margin - 8) / 3; // 3 colonnes égales
  const col2x = col1x + col3W + 4;
  const col3x = col2x + col3W + 4;
  const col2old = W / 2 + 4;
  const colW  = W / 2 - margin - 4;

  function drawField(x, fy, w, label, value) {
    // Fond léger
    doc.setFillColor(248, 248, 252);
    doc.roundedRect(x, fy, w, fieldH, 2, 2, 'F');
    // Bordure
    doc.setDrawColor(200, 205, 215);
    doc.setLineWidth(0.4);
    doc.roundedRect(x, fy, w, fieldH, 2, 2, 'S');
    // Barre colorée à gauche (bleue)
    doc.setFillColor(...BLUE);
    doc.rect(x, fy, 3, fieldH, 'F');
    // Label
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(140, 140, 155);
    doc.text(label.toUpperCase(), x + 6, fy + labelH);
    // Valeur
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.setTextColor(30, 35, 50);
    doc.text(String(value || '—'), x + 6, fy + labelH + 7);
  }

  // Ligne 1 : MATRICULE | NOM | PRÉNOM (sur une seule ligne)
  drawField(col1x, y, col3W, 'Matricule', worker.matricule || '—');
  drawField(col2x, y, col3W, 'Nom', worker.lastName);
  drawField(col3x, y, col3W, 'Prénom', worker.firstName);
  y += fieldH + 6;

  // Ligne 3 : DU | AU
  drawField(col1x, y, colW, 'Du', duFR);
  drawField(col2old, y, colW, 'Au', auFR);
  y += fieldH + 6;

  // Ligne 4 : NOMBRE DE JOURS — un code par ligne en vertical
  const codeEntries = Object.entries(codeCounts); // [[code, n], ...]
  const nbLignes = codeEntries.length;
  const nbFieldH = Math.max(fieldH + 4, 8 + nbLignes * 9);
  doc.setFillColor(248, 248, 252);
  doc.roundedRect(col1x, y, W - 2 * margin, nbFieldH, 2, 2, 'F');
  doc.setDrawColor(200, 205, 215);
  doc.setLineWidth(0.4);
  doc.roundedRect(col1x, y, W - 2 * margin, nbFieldH, 2, 2, 'S');
  doc.setFillColor(...BLUE);
  doc.rect(col1x, y, 3, nbFieldH, 'F');
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.setTextColor(140, 140, 155);
  doc.text('NOMBRE DE JOURS', col1x + 6, y + labelH);
  let lineY = y + labelH + 6;
  codeEntries.forEach(([code, n]) => {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.setTextColor(...BLUE);
    doc.text(n + ' ' + code, col1x + 6, lineY);
    lineY += 9;
  });
  y += nbFieldH + 6;

  // Ligne 5 : DATE (Fait le) | SIGNATURE
  const sigY = y;
  const sigH = 32;

  // Fait le
  drawField(col1x, sigY, colW, 'Fait le', today);

  // Zone signature
  doc.setFillColor(248, 248, 252);
  doc.roundedRect(col2old, sigY, colW, sigH, 2, 2, 'F');
  doc.setDrawColor(200, 205, 215);
  doc.setLineWidth(0.4);
  doc.roundedRect(col2old, sigY, colW, sigH, 2, 2, 'S');
  doc.setFillColor(...BLUE);
  doc.rect(col2old, sigY, 3, sigH, 'F');
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.setTextColor(140, 140, 155);
  doc.text('SIGNATURE', col2old + 6, sigY + labelH);

  y = sigY + sigH + 10;

  // ══ DÉTAILS DES CONGÉS ══
  if (_cmSelections.length > 0) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(...BLUE);
    doc.text('DÉTAILS DES CONGÉS', col1x, y);
    doc.setDrawColor(...BLUE);
    doc.setLineWidth(0.6);
    doc.line(col1x, y + 1.5, col1x + 55, y + 1.5);
    y += 8;

    // Colonnes
    const tC1 = col1x,        tW1 = 20;  // Type
    const tC2 = tC1 + tW1,    tW2 = 40;  // Du
    const tC3 = tC2 + tW2,    tW3 = 40;  // Au
    const tC4 = tC3 + tW3,    tW4 = 20;  // Jours
    const tRowH = 8;
    const tTotalW = tW1 + tW2 + tW3 + tW4;

    // En-tête
    doc.setFillColor(...BLUE);
    doc.rect(tC1, y, tTotalW, tRowH, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7.5);
    doc.setTextColor(255, 255, 255);
    doc.text('Type', tC1 + 2, y + 5.5);
    doc.text('Du',   tC2 + 2, y + 5.5);
    doc.text('Au',   tC3 + 2, y + 5.5);
    doc.text('Jours',tC4 + 2, y + 5.5);
    y += tRowH;

    // Lignes données
    _cmSelections.forEach((sel, idx) => {
      const mainCode = sel.code;
      const nbJours  = Object.values(sel.days).filter(c => c === mainCode).length;
      const duStr    = isoToFR(sel.from);
      const auStr    = sel.from === sel.to ? '—' : isoToFR(sel.to);

      // Fond alterné
      doc.setFillColor(idx % 2 === 0 ? 255 : 250, idx % 2 === 0 ? 255 : 248, idx % 2 === 0 ? 255 : 245);
      doc.rect(tC1, y, tTotalW, tRowH, 'F');
      // Bordure bas
      doc.setDrawColor(220, 222, 228);
      doc.setLineWidth(0.2);
      doc.line(tC1, y + tRowH, tC1 + tTotalW, y + tRowH);
      // Séparateurs verticaux
      [tC2, tC3, tC4].forEach(cx => {
        doc.line(cx, y, cx, y + tRowH);
      });

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(...BLUE);
      doc.text(mainCode, tC1 + 2, y + 5.5);
      doc.setTextColor(30, 35, 50);
      doc.setFont('helvetica', 'normal');
      doc.text(duStr,          tC2 + 2, y + 5.5);
      doc.text(auStr,          tC3 + 2, y + 5.5);
      doc.setFont('helvetica', 'bold');
      doc.text(nbJours + ' j', tC4 + 2, y + 5.5);
      y += tRowH;
    });

    // Bordure extérieure du tableau
    doc.setDrawColor(180, 185, 200);
    doc.setLineWidth(0.4);
    doc.rect(tC1, y - tRowH * _cmSelections.length - tRowH, tTotalW, tRowH * (_cmSelections.length + 1), 'S');

    y += 10;
  }

  // ══ PIED DE PAGE ══
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.setTextColor(170, 170, 180);
  doc.text('Document généré le ' + today + ' par Gestion Parc Réception Roulier', margin, H - 10);

  // ══ SAUVEGARDE ══
  const safeName = (worker.lastName + '-' + worker.firstName + '-' + (worker.matricule || 'X'))
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-zA-Z0-9-]/g, '_');
  const fileName = 'Feuille_Conges_' + safeName + '.pdf';
  doc.save(fileName);
}
window.generateFicheConges = generateFicheConges;

// ── VALIDATION ──
async function validateConges(sendMail = false) {
  if (_cmSelections.length === 0) {
    toast('Aucune plage sélectionnée', 'error');
    return;
  }

  if (!state.manualConges[_cmWorkerId]) state.manualConges[_cmWorkerId] = {};

  _cmSelections.forEach(sel => {
    Object.entries(sel.days).forEach(([iso, code]) => {
      // Ne pas écraser l'API
      if (!state.absences[_cmWorkerId]?.[iso]) {
        state.manualConges[_cmWorkerId][iso] = code;
      }
    });
  });

  mergeAbsences();
  renderAbsences();
  closeCongeModal();
  await saveCongesRemote();
  toast('Congés enregistrés ✓');

  if (sendMail) {
    sendCongesMail(_cmWorkerId, _cmSelections);
  }
}
window.validateConges = validateConges;

// ── ENVOI MAIL CONGÉS ──
function sendCongesMail(workerId, selections) {
  const worker = getWorker(workerId);
  if (!worker) return;
  const workerName = worker.lastName + ' ' + worker.firstName;

  // Résumé des plages
  const lignes = selections.map(sel => {
    const mainCode = sel.code;
    const mainDays = Object.values(sel.days).filter(c => c === mainCode).length;
    const fromFR = isoToFR(sel.from);
    const toFR = isoToFR(sel.to);
    return sel.from === sel.to
      ? '  - ' + mainCode + ' : ' + fromFR + ' (' + mainDays + ' j)'
      : '  - ' + mainCode + ' : ' + fromFR + ' → ' + toFR + ' (' + mainDays + ' j de ' + mainCode + ')';
  });

  const subject = 'Demande de congés — ' + workerName;
  const body = 'Bonjour,\n\nVeuillez trouver ci-dessous la demande de congés pour ' + workerName + ' :\n\n' + lignes.join('\n') + '\n\nCordialement.';

  const to  = state.config.emailWeek  || '';
  const cc  = state.config.emailCcWeek || '';
  const bcc = state.config.emailBccWeek || '';
  const ccPart  = cc  ? '&cc='  + encodeURIComponent(cc)  : '';
  const bccPart = bcc ? '&bcc=' + encodeURIComponent(bcc) : '';

  window.open('mailto:' + to + '?' + 'subject=' + encodeURIComponent(subject) + ccPart + bccPart + '&body=' + encodeURIComponent(body));
}
window.sendCongesMail = sendCongesMail;


loadState();
initApp();
</script>
